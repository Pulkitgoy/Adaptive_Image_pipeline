apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-service

  template:
    metadata:
      labels:
        app: api-service

    spec:
      containers:
        - name: api-service
          image: pulkitgo/api-service:v1

          ports:
            - containerPort: 3000

          volumeMounts:
            - name: uploads-volume
              mountPath: /uploads

      volumes:
        - name: uploads-volume
          emptyDir: {}

---
apiVersion: v1
kind: Service

metadata:
  name: api-service

spec:
  type: NodePort

  selector:
    app: api-service

  ports:
    - port: 3000
      targetPort: 3000
