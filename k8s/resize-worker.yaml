apiVersion: apps/v1
kind: Deployment

metadata:
  name: resize-worker

spec:
  replicas: 1

  selector:
    matchLabels:
      app: resize-worker

  template:
    metadata:
      labels:
        app: resize-worker

    spec:
      containers:
      - name: resize-worker
        image: pulkitgo/resize-worker:v1

        volumeMounts:
        - name: uploads-volume
          mountPath: /uploads

        - name: processed-volume
          mountPath: /processed

      volumes:
      - name: uploads-volume
        emptyDir: {}

      - name: processed-volume
        emptyDir: {}
