services:
  api-service:
    build: ./api-service
    ports:
      - "3000:3000"
    depends_on:
      - redis
    volumes:
      - ./uploads:/uploads
  resize-worker:
    build: ./workers/resize-worker
    depends_on:
      - redis
      - mongodb
    ports:
      - "4001:4000"
    volumes:
      - ./uploads:/uploads
      - ./processed:/processed
     
  compress-worker:
    build: ./workers/compress-worker
    depends_on:
      - redis
      - mongodb
    ports:
      - "4002:4000"
    volumes:
      - ./uploads:/uploads
      - ./processed:/processed
     
  ai-worker:
    build: ./workers/ai-worker
    depends_on:
      - redis
      - mongodb
    ports:
      - "4003:4000"
    volumes:
      - ./uploads:/uploads
      - ./processed:/processed
  
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    
  aiops-engine:
    build: ./aiops-engine
    depends_on:
      - redis
      
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
  prometheus:
    image: prom/prometheus
    ports:
      - "9095:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
