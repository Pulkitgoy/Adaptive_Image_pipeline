services:

  jenkins:
    build: ./jenkins
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/pulkit/Desktop/adaptive-image-pipeline:/project

volumes:
  jenkins_home:
